<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Convertor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Currency Convertor</h2>
        <form>
            <div class="amount">
                <p>Enter Amount</p>
                <input value="100" type="text">
            </div>
            <div class="Dropdown">
                <div class="from">
                    <p>from</p>
                    <div class="Select container">
                        <img src=""https://flagsapi.com/US/flat/64.png" alt="">
                        <select name="from" >
                            <option>USD</option>
                            <option>INR</option>
                        </select>
                    </div>
                </div>
                <div class="to">
                    <p>to</p>
                    <div class="Select container">
                        <img src=""https://flagsapi.com/INR/flat/64.png" alt="">
                        <select name="from" >
                            <option>USD</option>
                            <option>INR</option>
                        </select>
                    </div>
                </div>
                </div>
            
            <div class="msg">1USD = 80INR</div>
            <button>Get Exchange Rate</button>
        </form>
    </div>
</body>
</html>
